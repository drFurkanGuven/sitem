    .error-page {

    }

    }
    .error-page p {
      color: var(--text-muted); margin-bottom: 2rem; max-width: 480px;
    }
    .error-link {
      font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
      color: var(--highlight); border: 1px solid var(--highlight);
      padding: 0.6rem 1.4rem; border-radius: 4px;
      transition: background 0.25s ease, color 0.25s ease;
    }
    .error-link:hover {
      background: var(--highlight); color: var(--bg); text-decoration: none; opacity: 1;
    }
